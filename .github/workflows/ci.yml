name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-checks:
    name: Backend checks (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app ml

      - name: Smoke import app + ML modules
        run: |
          python - <<'PY'
          from app.main import app
          from app.wellness_routes import router as _wellness_router
          from ml.dataset_normalize import detect_format
          from ml.predictor import row_from_payload
          assert _wellness_router.prefix == "/api/wellness"
          assert callable(detect_format)
          assert app.title
          payload = {
              "date_of_joining": "2024-01-01",
              "gender": "Male",
              "company_type": "Service",
              "wfh_setup_available": "Yes",
              "designation": 2,
              "resource_allocation": 5.0,
              "mental_fatigue_score": 6.5,
          }
          row = row_from_payload(payload, reference_date=__import__("datetime").date.today())
          assert len(row) == 1
          print("Backend smoke checks passed")
          PY

  frontend-checks:
    name: Frontend checks (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
