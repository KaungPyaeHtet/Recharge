services:
  - type: web
    name: recharge
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    disk:
      name: recharge-db
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////app/data/app.db
