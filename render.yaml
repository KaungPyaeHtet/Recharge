services:
  - type: web
    name: recharge
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: recharge-db
          property: connectionString

databases:
  - name: recharge-db
    plan: free
